repos:
  - repo: local
    hooks:
      - id: lint
        name: lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: uv run pyright
        language: system
        pass_filenames: false
      - id: trufflehog
        name: trufflehog secret scan
        entry: trufflehog git file://. --only-verified --fail
        language: system
        pass_filenames: false
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: worker-typecheck
        name: worker typecheck (tsc)
        entry: bash -c 'cd worker && npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]
