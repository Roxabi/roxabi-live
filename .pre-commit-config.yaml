repos:
  - repo: local
    hooks:
      - id: biome
        name: biome (lint + format) — worker/src + frontend
        entry: bash -c 'cd worker && npx biome check src ../frontend'
        language: system
        pass_filenames: false
      - id: trufflehog
        name: trufflehog secret scan
        entry: trufflehog git file://. --only-verified --fail
        language: system
        pass_filenames: false
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: worker-typecheck
        name: worker typecheck (tsc)
        entry: bash -c 'cd worker && npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]
