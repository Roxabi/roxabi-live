repos:
  - repo: local
    hooks:
      - id: biome
        name: biome (lint + format) — apps/api/src + apps/app/src
        entry: bash -c 'bunx biome check apps/api/src apps/app/src packages/shared/src'
        language: system
        pass_filenames: false
      - id: trufflehog
        name: trufflehog secret scan
        entry: trufflehog git file://. --only-verified --fail
        language: system
        pass_filenames: false
      - id: license
        name: license check
        entry: uv run tools/license_check.py
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: api-typecheck
        name: api + app typecheck (tsc)
        entry: bash -c 'bun --filter @roxabi-live/api typecheck && bun --filter @roxabi-live/app typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]
