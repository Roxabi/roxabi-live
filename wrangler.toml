name = "roxabi-live"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
# NO nodejs_compat — Web Crypto is available natively in the Workers runtime.

# Production custom domain (S9 cutover, #101). With `custom_domain = true`
# Cloudflare provisions the DNS record + edge TLS cert for live.roxabi.dev and
# binds it to this Worker on the next production deploy.
# ⚠️ `routes` is an INHERITABLE wrangler key (unlike the *bindings*
# [[d1_databases]] / [[r2_buckets]], which are NOT inherited). Named
# environments inherit `routes` unless they override it — so [env.staging] sets
# `routes = []` (below) to break the chain. Without that override a
# `--env staging` deploy would inherit this entry and bind live.roxabi.dev to
# the STAGING Worker (premature domain creation + wrong target).
# Ref: cloudflare/workers-sdk#13925.
# ⚠️ SECURITY GATE: this route takes effect on the next *production* deploy
# (push to `main` via Workers Builds, or manual `npm run deploy:production`). CF Access App 1 (Email OTP,
# all paths) MUST already exist BEFORE that deploy — otherwise the dashboard is
# publicly reachable at https://live.roxabi.dev with no auth.
# See docs/s9-cutover.md → Phase 4 (Access apps precede the custom domain).
routes = [
  { pattern = "live.roxabi.dev", custom_domain = true },
]

[vars]
APP_RELEASE = "0.19.12"
ZK_ACCOUNT_KEY = "1"
# structure-only MUST be "1" whenever ZK_ACCOUNT_KEY is "1" — otherwise the daily
# cron re-fetches and stores plaintext issue titles in D1, breaking the ZK promise.
# (#142/#216)
ZK_STRUCTURE_ONLY = "1"

[assets]
directory = "./frontend"
binding   = "ASSETS"
# Only the shell paths hit the Worker auth gate — NOT /dashboard/index.html (internal
# ASSETS fetch + Playwright would loop 307→/dashboard/ if /* is included).
run_worker_first = [ "/dashboard", "/dashboard/" ]

[triggers]
# Autonomous cron DISABLED — webhooks are the primary sync path. Use POST /admin/sync
# for manual full reconcile / drift checks against webhook coverage. Re-enable with
# crons = ["0 0 * * *"] if a daily heal net is needed again (#80).
crons = []

# Workers Logs (S8, #100) — in-dashboard invocation logs (~3-day retention on the
# Free plan). NOTE: persistent export via Logpush→R2 needs Workers Paid; on Free the
# persistent audit trail is instead written by the Worker itself (#120, see [[r2_buckets]]
# below). head_sampling_rate=1 keeps every cron invocation (1/day — volume is trivial).
[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-production"
database_id    = "c3951107-146c-4a7d-a8a5-86d09e4570e9"
migrations_dir = "worker/migrations"

# R2 audit bucket (#120) — runSync writes a per-run JSON summary here (Free-plan
# alternative to Logpush). Bucket created via `wrangler r2 bucket create roxabi-live-logs`.
[[r2_buckets]]
binding     = "LOGS"
bucket_name = "roxabi-live-logs"

# ── Staging environment ──────────────────────────────────────────────────────

[env.staging]
name = "roxabi-live-staging"
workers_dev = true

[env.staging.vars]
APP_RELEASE = "0.19.12"
GITHUB_APP_SLUG = "roxabi-live-staging"
ZK_ACCOUNT_KEY = "1"
ZK_STRUCTURE_ONLY = "1"
# `routes` is inheritable — without this explicit empty override a staging
# deploy would inherit the top-level live.roxabi.dev custom domain (#101) and
# bind it to the staging Worker. Keep this even though staging has no routes.
routes = []

[[env.staging.d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-staging"
database_id    = "dd96d8cd-db6b-49ed-8218-53c88773aff4"
migrations_dir = "worker/migrations"

[env.staging.triggers]
# Staging sync DISABLED (manual/test-only env). An autonomous staging cron would
# fire a redundant 2nd full GitHub sync + D1 writes every tick against the shared
# Free-plan quota for no prod benefit. Deploy `--env staging` to test sync manually,
# or hit POST /admin/sync. Re-enable by restoring a cron expr here if needed.
crons = []

# Named environments do not inherit top-level [observability] — repeat per env.
[env.staging.observability]
enabled = true
head_sampling_rate = 1

# Named envs don't inherit top-level [[r2_buckets]] either — repeat for staging.
# Separate bucket from prod to isolate staging/prod audit-log streams.
[[env.staging.r2_buckets]]
binding     = "LOGS"
bucket_name = "roxabi-live-logs-staging"

# ── Dormant — activate when Workers Paid (Queues) is enabled ─────────────────
# DORMANT — activate on Workers Paid + >30 repos (no consumer in Phase 1; uncommenting requires `wrangler queues create`)
# [[queues.producers]]
# binding = "SYNC_QUEUE"
# queue   = "roxabi-live-sync"
# dormant — activate with Queues (Workers Paid) for per-repo sync fan-out, see #146
