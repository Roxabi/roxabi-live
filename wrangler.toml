name = "roxabi-live"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
# NO nodejs_compat — Web Crypto is available natively in the Workers runtime.

[assets]
directory = "./frontend"
binding   = "ASSETS"

[triggers]
crons = ["0 * * * *"]

# Workers Logs (S8, #100) — emits invocation logs that Logpush ships to the
# roxabi-live-logs R2 bucket for a persistent audit trail (go/no-go gate for S9
# cutover, since M₁'s local logs disappear at decommission). head_sampling_rate=1
# keeps every cron invocation (1/hour — volume is trivial).
[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-production"
database_id    = "c3951107-146c-4a7d-a8a5-86d09e4570e9"
migrations_dir = "worker/migrations"

# ── Staging environment ──────────────────────────────────────────────────────

[env.staging]
name = "roxabi-live-staging"

[[env.staging.d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-staging"
database_id    = "dd96d8cd-db6b-49ed-8218-53c88773aff4"
migrations_dir = "worker/migrations"

[env.staging.triggers]
crons = ["0 * * * *"]

# Named environments do not inherit top-level [observability] — repeat per env.
[env.staging.observability]
enabled = true
head_sampling_rate = 1
