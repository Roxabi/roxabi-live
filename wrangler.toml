name = "roxabi-live"
main = "worker/src/index.ts"
compatibility_date = "2025-01-01"
# NO nodejs_compat — Web Crypto is available natively in the Workers runtime.

[assets]
directory = "./frontend"
binding   = "ASSETS"

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-production"
database_id    = "c3951107-146c-4a7d-a8a5-86d09e4570e9"
migrations_dir = "worker/migrations"

# ── Staging environment ──────────────────────────────────────────────────────

[env.staging]
name = "roxabi-live-staging"

[[env.staging.d1_databases]]
binding        = "DB"
database_name  = "roxabi-live-staging"
database_id    = "dd96d8cd-db6b-49ed-8218-53c88773aff4"
migrations_dir = "worker/migrations"

[env.staging.triggers]
crons = ["0 * * * *"]
