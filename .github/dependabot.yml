version: 2

updates:
  # npm / bun dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @types/node major versions track Node.js majors — only LTS (even) versions.
      # Upgrade manually when targeting a new LTS (e.g. 22 → 24 in Oct 2026).
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci

  # Docker (apps/api)
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    ignore:
      # Only upgrade to even (LTS) Node versions — odd releases are not LTS.
      # Dependabot will still open PRs for even versions (24, 26, 28…).
      - dependency-name: node
        versions:
          - ">= 23, < 24"
          - ">= 25, < 26"
          - ">= 27, < 28"
          - ">= 29, < 30"
    labels:
      - dependencies
      - docker

  # Docker (apps/web)
  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    ignore:
      # Only upgrade to even (LTS) Node versions — odd releases are not LTS.
      # Dependabot will still open PRs for even versions (24, 26, 28…).
      - dependency-name: node
        versions:
          - ">= 23, < 24"
          - ">= 25, < 26"
          - ">= 27, < 28"
          - ">= 29, < 30"
    labels:
      - dependencies
      - docker
