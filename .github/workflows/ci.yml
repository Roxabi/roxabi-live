name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/staging' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v7

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check file length
        run: bash tools/check_file_length.sh

      - name: Check folder size
        run: bash tools/check_folder_size.sh

      - name: Check duplicate test basenames
        run: bash tools/check_duplicate_test_basenames.sh

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run pyright

      - name: Test
        run: uv run pytest tests/ --cov=roxabi_live --cov-branch --cov-report=term-missing
