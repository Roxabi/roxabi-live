name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]
  workflow_call:

permissions:
  pull-requests: write
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.9"
  NODE_VERSION: "24"

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'tools/**'
              - 'turbo.jsonc'
              - 'bun.lock'
              - 'biome.json'
              - 'tsconfig*.json'
              - 'lefthook.yml'
              - '.github/workflows/**'
            e2e:
              - 'apps/web/src/**'
              - 'apps/web/e2e/**'
              - 'packages/ui/src/**'
              - 'packages/playwright-config/**'
              - 'playwright.config.ts'
              - '.github/workflows/ci.yml'
              - 'turbo.jsonc'

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [detect-changes]
    if: |
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.code == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@v3.94.1
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || (github.event.before != '0000000000000000000000000000000000000000' && github.event.before) || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-changes]
    if: |
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.code == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun lint

      - name: Run custom lint checks
        run: bun run lint:custom

      - name: Check env sync
        run: bun run env:check

      - name: Validate translations
        run: bun run i18n:check

      - name: Check dependency licenses
        run: bun run license:check

      - name: Check MDX files
        run: bun run mdx:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes]
    if: |
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.code == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-typecheck-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-typecheck-${{ runner.os }}-

      - name: Generate Paraglide & route tree
        run: cd apps/web && bun run codegen

      - name: Run typecheck
        run: bun typecheck
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Check for schema drift
        run: |
          cd apps/api && bun run db:generate
          if ! git diff --exit-code --quiet -- drizzle/; then
            echo "::error::Schema drift detected! Your Drizzle schema has changes that are not captured in a migration file."
            echo "::error::Run 'cd apps/api && bun run db:generate' locally and commit the generated migration."
            git diff --stat -- drizzle/
            exit 1
          fi
        env:
          # drizzle-kit generate only reads the schema files to produce SQL
          # migrations — it does NOT connect to a database. This dummy URL
          # satisfies the DATABASE_URL requirement in the Drizzle config file.
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-changes]
    if: |
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.code == 'true')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-

      - name: Generate Paraglide & route tree
        run: cd apps/web && bun run codegen

      - name: Build shared packages
        run: bun run build --filter=@repo/types --filter=@repo/config --filter=@repo/email --filter=@repo/ui

      - name: Apply RLS migration for integration tests
        run: psql "$DATABASE_URL" -f apps/api/drizzle/migrations/0000_baseline.sql
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Run tests with coverage
        run: bun test:coverage
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Coverage report on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, lint, typecheck, test]
    if: |
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.code == 'true')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        # --force bypasses turbo cache reads. Turbo's remote cache hit replays logs
        # and cleans output dirs but silently fails to restore files, leaving
        # apps/web/.output/ empty. --force guarantees a real build every time.
        # Outputs are still written to remote cache after the build.
        run: bunx turbo build --force
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          # Raise Node heap to 6 GB on the 7 GB ubuntu-latest runner.
          # Default V8 ceiling (~4 GB) is marginal given Nitro's SSR bundle size.
          # See artifacts/analyses/437-shiki4-oom-build.mdx for root cause.
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Check SSR chunk sizes
        # Fail if any single SSR chunk exceeds 2 MB.
        # If the router chunk regresses (e.g. a .lazy.tsx is removed), CI fails
        # with a clear message instead of an OOM crash.
        run: |
          if [ ! -d apps/web/.output/server ]; then
            echo "::error::apps/web/.output/server/ is missing — web build may have failed silently."
            exit 1
          fi
          LIMIT_KB=2000
          failed=0
          while IFS= read -r -d '' f; do
            size=$(du -k "$f" | cut -f1)
            if [ "$size" -gt "$LIMIT_KB" ]; then
              echo "::error file=$f::SSR chunk too large: ${size} KB (limit ${LIMIT_KB} KB). Split with a .lazy.tsx file."
              failed=1
            fi
          done < <(find apps/web/.output/server -name "*.mjs" -print0)
          [ "$failed" -eq 0 ] || exit 1

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-output
          path: apps/web/.output/
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build-output
          path: apps/api/dist/
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, build]
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      github.event_name == 'pull_request' &&
      (
        contains(github.event.pull_request.labels.*.name, 'e2e') ||
        needs.detect-changes.outputs.e2e == 'true'
      )
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      mailpit:
        image: axllent/mailpit:v1.29.2
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd="wget -qO- http://localhost:8025/api/v1/messages?limit=1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long
      SMTP_HOST: localhost
      RATE_LIMIT_ENABLED: "false"
      QUEUE_WORKER_ENABLED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        # Restores packages/*/dist/ from turbo remote cache (written by the Build job).
        # Required because apps/api/node_modules/@repo/* are workspace symlinks pointing
        # to packages/*/dist/ which don't exist in the checked-out repo.
        run: bun run build --filter=@repo/types --filter=@repo/config --filter=@repo/email --filter=@repo/ui
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build-output
          path: apps/web/.output

      - name: Download API build artifact
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: apps/api/dist

      - name: Run E2E tests
        run: bun test:e2e --project=chromium --reporter=list --reporter=html

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Intentionally runs on every push to main/staging regardless of changed paths.
  # Full browser coverage is required on protected branches before release.
  e2e-matrix:
    name: E2E Matrix (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build]
    if: |
      !cancelled() &&
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      mailpit:
        image: axllent/mailpit:v1.29.2
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd="wget -qO- http://localhost:8025/api/v1/messages?limit=1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      BETTER_AUTH_SECRET: test-secret-minimum-32-characters-long
      SMTP_HOST: localhost
      RATE_LIMIT_ENABLED: "false"
      QUEUE_WORKER_ENABLED: "true"
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared packages
        # Restores packages/*/dist/ from turbo remote cache (written by the Build job).
        # Required because apps/api/node_modules/@repo/* are workspace symlinks pointing
        # to packages/*/dist/ which don't exist in the checked-out repo.
        run: bun run build --filter=@repo/types --filter=@repo/config --filter=@repo/email --filter=@repo/ui
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium firefox webkit

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build-output
          path: apps/web/.output

      - name: Download API build artifact
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: apps/api/dist

      - name: Run E2E tests (shard ${{ matrix.shard }})
        run: bun test:e2e --shard=${{ matrix.shard }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    needs: [e2e-matrix]
    if: always() && needs.e2e-matrix.result != 'skipped'
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports

      - name: Merge reports
        run: bunx playwright merge-reports --reporter html all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 7

  vercel-env-check:
    name: Vercel Env Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Check production env vars
        if: github.ref == 'refs/heads/main'
        run: bun run scripts/checkVercelEnv.ts production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Check preview env vars
        if: github.ref == 'refs/heads/staging'
        run: bun run scripts/checkVercelEnv.ts preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs: [secrets, lint, typecheck, test, build, e2e, e2e-matrix, merge-reports]
    steps:
      - name: Check job outcomes
        env:
          SECRETS_RESULT: ${{ needs.secrets.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          E2E_MATRIX_RESULT: ${{ needs.e2e-matrix.result }}
          MERGE_REPORTS_RESULT: ${{ needs.merge-reports.result }}
        run: |
          results=( \
            "$SECRETS_RESULT" \
            "$LINT_RESULT" \
            "$TYPECHECK_RESULT" \
            "$TEST_RESULT" \
            "$BUILD_RESULT" \
            "$E2E_RESULT" \
            "$E2E_MATRIX_RESULT" \
            "$MERGE_REPORTS_RESULT" \
          )
          for result in "${results[@]}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "::error::One or more CI jobs failed or were cancelled."
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped."

