name: CI

permissions:
  contents: read

env:
  NODE_VERSION: "22"

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/staging' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check file length
        run: bash tools/check_file_length.sh

      - name: Check folder size
        run: bash tools/check_folder_size.sh

      - name: Lint tools
        run: uv run ruff check tools

      - name: License check
        run: uv run tools/license_check.py

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Assert E2E_TEST_MODE not in apps/api/wrangler.toml
        run: |
          if grep -E '^\s*E2E_TEST_MODE\s*=' apps/api/wrangler.toml; then
            echo "E2E_TEST_MODE must not be committed (local Playwright only)"
            exit 1
          fi
      - name: Lint + format (Biome — api + app)
        run: bunx biome ci apps/api/src apps/app/src
      - name: Typecheck (api)
        run: bun --filter @roxabi-live/api typecheck
      - name: Test (api — vitest)
        run: bun --filter @roxabi-live/api test

  app:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Typecheck (shared + app)
        run: |
          bun --filter @roxabi-live/shared typecheck
          bun --filter @roxabi-live/app typecheck
      - name: Test (app — vitest)
        run: bun --filter @roxabi-live/app test
      # Marketing: gate on a successful Astro build (astro check has pre-existing
      # i18n literal-type debt — tracked separately, not a cutover regression).
      - name: Build (marketing — astro)
        run: bun --filter @roxabi-live/marketing build

  plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install plugin deps
        run: cd plugins/roxabi-issues && bun install --frozen-lockfile
      - name: Typecheck (tsc)
        run: cd plugins/roxabi-issues && bun run typecheck
      - name: Test (vitest)
        run: cd plugins/roxabi-issues && bun run test

  # Legacy frontend/ (vanilla JS) is now ASSETS-only fallback on the api worker;
  # the cockpit is apps/app (covered by the `app` job). Its retirement removes the
  # old `frontend` CI job. frontend/ itself is deleted once the cutover is live.

  # Deploy: GitHub Actions (.github/workflows/deploy-staging.yml on push to staging).
  # CF Workers Builds is not connected (infra/workers-builds.json is unapplied).
  # CI runs quality gates only — no wrangler deploy here.
