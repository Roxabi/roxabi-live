name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/staging' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v7

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check file length
        run: bash tools/check_file_length.sh

      - name: Check folder size
        run: bash tools/check_folder_size.sh

      - name: Check duplicate test basenames
        run: bash tools/check_duplicate_test_basenames.sh

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run pyright

      - name: Test
        run: uv run pytest tests/ --cov=roxabi_live --cov-branch --cov-report=term-missing

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install worker deps
        run: cd worker && npm ci
      - name: Typecheck (tsc)
        run: cd worker && npm run typecheck
      - name: Test (vitest)
        run: cd worker && npm test

  deploy:
    needs: [ci, worker]
    if: github.event_name == 'push' && (github.ref_name == 'staging' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Guard — require CF_API_TOKEN (green no-op until provisioned, epic #92)
        id: guard
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "::notice::CF_API_TOKEN not set — skipping Worker deploy until CF credentials are provisioned (#92 prereq)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - if: steps.guard.outputs.enabled == 'true'
        name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - if: steps.guard.outputs.enabled == 'true'
        name: Install worker deps
        run: cd worker && npm ci
      - if: steps.guard.outputs.enabled == 'true' && github.ref_name == 'staging'
        name: Deploy (staging)
        run: cd worker && npx wrangler deploy --env staging --config ../wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - if: steps.guard.outputs.enabled == 'true' && github.ref_name == 'main'
        name: Deploy (production)
        run: cd worker && npx wrangler deploy --config ../wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
