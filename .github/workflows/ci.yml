name: CI

permissions:
  contents: read

env:
  NODE_VERSION: "22"

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/staging' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Check file length
        run: bash tools/check_file_length.sh

      - name: Check folder size
        run: bash tools/check_folder_size.sh

      - name: Lint tools
        run: uv run ruff check tools

      - name: License check
        run: uv run tools/license_check.py

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install worker deps
        run: cd worker && npm ci
      - name: Assert E2E_TEST_MODE not in wrangler.toml
        run: |
          if grep -E '^\s*E2E_TEST_MODE\s*=' wrangler.toml; then
            echo "E2E_TEST_MODE must not be committed in wrangler.toml (local Playwright only)"
            exit 1
          fi
      - name: Lint + format (Biome)
        run: cd worker && npm run ci:lint
      - name: Typecheck (tsc)
        run: cd worker && npm run typecheck
      - name: Test (vitest)
        run: cd worker && npm test
      # Informational only — does NOT fail the build.
      # Known advisory: undici (GHSA-xxx) is a dev-only transitive of wrangler,
      # not present in production bundle. --omit=dev scopes to prod deps only.
      - name: Audit prod deps (informational)
        run: cd worker && npm audit --omit=dev --audit-level=high || true

  plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install plugin deps
        run: cd plugins/roxabi-issues && bun install --frozen-lockfile
      - name: Typecheck (tsc)
        run: cd plugins/roxabi-issues && bun run typecheck
      - name: Test (vitest)
        run: cd plugins/roxabi-issues && bun run test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Test (vitest)
        run: cd frontend && npm test

  # Deploy: Cloudflare Workers Builds (git-connected). See docs/DEPLOY.md §8 and
  # infra/workers-builds.json. CI runs quality gates only — no wrangler deploy here.
