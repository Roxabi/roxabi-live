# .claude/stack.yml — dev-core stack configuration
schema_version: "1.0"

runtime: node
package_manager: npm

backend:
  framework: hono
  path: worker/src

frontend:
  framework: none  # static HTML/JS/CSS; served via CF Worker ASSETS binding
  path: frontend

build:
  formatter: biome  # Biome (lint+format) over worker/src + frontend; config in biome.json (repo root)

testing:
  unit: vitest

lsp:
  enabled: true
  server: typescript-language-server

deploy:
  platform: cloudflare  # wrangler deploy via CI; push to staging → staging env, push to main → prod

docs:
  framework: none
  path: docs
  format: md

commands:
  dev: cd worker && npm run dev
  test: cd worker && npm test
  typecheck: cd worker && npm run typecheck
  install: cd worker && npm ci
  lint: cd worker && npm run lint  # biome check src ../frontend
  format: cd worker && npm run format  # biome check --write src ../frontend

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

quality_gates:
  file_length:
    enabled: true
    metric: sloc
    max_lines: 300
    # CI-authoritative config in tools/qg.conf (regenerated from this block, #180).
    # Scans worker/src/**/*.ts via sloc-npm; legacy frozen Python (src/) is out of scope.
    # Files above the cap are listed in tools/file_exemptions.txt with local SLOC ceilings.
    globs: ["worker/src/**/*.ts"]
    exemptions_file: tools/file_exemptions.txt

  folder_size:
    enabled: false
    max_files: 12
    # Node runtime: canonical check_folder_size.sh counts *.py only (dev-core N1).
    # worker/src subdirs are all ≤9 non-test .ts files — no gate needed until a TS folder counter exists.
    globs: ["worker/src/**"]
    exemptions_file: tools/folder_exemptions.txt

  duplicate_test_basenames:
    enabled: true
    script: tools/check_duplicate_test_basenames.sh
    source: pyproject.toml [tool.pytest.ini_options].testpaths

  import_layers:
    enabled: false
