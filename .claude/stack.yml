# .claude/stack.yml — dev-core stack configuration
schema_version: "1.0"

runtime: node
package_manager: bun  # monorepo: bun workspaces (apps/*, packages/*)

backend:
  framework: hono
  path: apps/api/src  # moved from worker/ at the monorepo cutover

frontend:
  framework: react  # apps/app — React 19 + Vite + TanStack + Tailwind v4 + shadcn (SPA)
  path: apps/app/src

build:
  formatter: biome  # Biome (lint+format) over apps/api/src + apps/app/src; config in biome.json (repo root)

testing:
  unit: vitest

lsp:
  enabled: true
  server: typescript-language-server

deploy:
  platform: cloudflare  # Staging: GitHub Actions → wrangler (.github/workflows/deploy-staging.yml). Prod: manual wrangler for now.

docs:
  framework: none
  path: docs
  format: md

commands:
  dev: bun --filter @roxabi-live/api dev
  test: bun --filter @roxabi-live/api test
  typecheck: bun --filter @roxabi-live/api typecheck
  install: bun install
  lint: bunx biome check apps/api/src apps/app/src
  format: bunx biome check --write apps/api/src apps/app/src

artifacts:
  analyses: artifacts/analyses
  specs: artifacts/specs
  frames: artifacts/frames
  plans: artifacts/plans

quality_gates:
  file_length:
    enabled: true
    metric: sloc
    max_lines: 300
    # CI-authoritative config in tools/qg.conf (regenerated from this block, #180).
    # Scans worker/src/**/*.ts via sloc-npm; legacy frozen Python (src/) is out of scope.
    # Files above the cap are listed in tools/file_exemptions.txt with local SLOC ceilings.
    globs: ["apps/api/src/**/*.ts"]
    exemptions_file: tools/file_exemptions.txt

  folder_size:
    enabled: false
    max_files: 12
    # Node runtime: canonical check_folder_size.sh counts *.py only (dev-core N1).
    # worker/src subdirs are all ≤9 non-test .ts files — no gate needed until a TS folder counter exists.
    globs: ["apps/api/src/**"]
    exemptions_file: tools/folder_exemptions.txt

  duplicate_test_basenames:
    enabled: false

  import_layers:
    enabled: false
